<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Light – Innovative Belysningskoncepter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* ── Hero wrapper ── */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8vw;
    }

    /* ── Spotlight overlay – the dark mask with a radial "hole" ── */
    .spotlight-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(
        circle 320px at 50% 50%,
        transparent 0%,
        rgba(0, 0, 0, 0.92) 55%,
        #000 80%
      );
      transition: background 0.05s linear;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: rgba(255, 255, 240, 0.9);
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px 8px rgba(255, 255, 220, 0.5);
      transition: transform 0.08s ease;
    }

    /* ── Left content ── */
    .hero-left {
      flex: 1;
      max-width: 52%;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .brand-name {
      font-size: clamp(3.5rem, 7vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #ffffff;
      /* subtle green shimmer in the last word */
    }

    .brand-name .green {
      color: #6ee7a0;
    }

    .brand-name .light {
      color: #ffffff;
    }

    .tagline {
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      font-weight: 300;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.82);
      max-width: 440px;
    }

    /* ── Divider ── */
    .divider {
      width: 1px;
      height: 220px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(110, 231, 160, 0.35) 30%,
        rgba(110, 231, 160, 0.35) 70%,
        transparent
      );
      flex-shrink: 0;
      margin: 0 5vw;
    }

    /* ── Right content – USPs ── */
    .hero-right {
      flex: 1;
      max-width: 38%;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .usp-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6ee7a0;
    }

    .usp-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .usp-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .usp-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .usp-icon svg {
      width: 100%;
      height: 100%;
    }

    .usp-text {
      font-size: clamp(0.9rem, 1.3vw, 1.05rem);
      font-weight: 400;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.88);
    }

    /* ── Ambient glow at very bottom (subtle floor reflection) ── */
    .floor-glow {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(110, 231, 160, 0.3) 30%,
        rgba(110, 231, 160, 0.5) 50%,
        rgba(110, 231, 160, 0.3) 70%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 5;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      html, body {
        overflow-y: auto;
        cursor: auto;
      }

      .hero {
        flex-direction: column;
        justify-content: center;
        padding: 60px 8vw;
        height: auto;
        min-height: 100vh;
        gap: 48px;
      }

      .hero-left,
      .hero-right {
        max-width: 100%;
      }

      .divider {
        width: 220px;
        height: 1px;
        margin: 0;
        background: linear-gradient(
          to right,
          transparent,
          rgba(110, 231, 160, 0.35) 30%,
          rgba(110, 231, 160, 0.35) 70%,
          transparent
        );
      }

      .spotlight-overlay {
        display: none;
      }

      .cursor {
        display: none;
      }

      .tagline {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Spotlight overlay (manipulated by JS) -->
  <div class="spotlight-overlay" id="spotlightOverlay"></div>

  <!-- Custom cursor dot -->
  <div class="cursor" id="cursor"></div>

  <!-- Subtle floor line -->
  <div class="floor-glow"></div>

  <section class="hero">

    <!-- LEFT -->
    <div class="hero-left">
      <h1 class="brand-name">
        <span class="green">green</span><br>
        <span class="light">light</span>
      </h1>
      <p class="tagline">
        Vi skaber øget trivsel gennem innovative belysningskoncepter til virksomheder og det offentlige.
      </p>
    </div>

    <!-- Vertical divider -->
    <div class="divider"></div>

    <!-- RIGHT -->
    <div class="hero-right">
      <span class="usp-label">Hvorfor Green Light</span>
      <ul class="usp-list" role="list">

        <li class="usp-item">
          <div class="usp-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="16" cy="16" r="14" stroke="#6ee7a0" stroke-width="1.5"/>
              <path d="M10 16.5l4 4 8-8" stroke="#6ee7a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="usp-text">Dokumenteret effekt før beslutning</p>
        </li>

        <li class="usp-item">
          <div class="usp-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="16" cy="16" r="14" stroke="#6ee7a0" stroke-width="1.5"/>
              <path d="M16 9v7l4.5 4.5" stroke="#6ee7a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="usp-text">Intelligent styring, der reducerer forbrug markant</p>
        </li>

        <li class="usp-item">
          <div class="usp-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="16" cy="16" r="14" stroke="#6ee7a0" stroke-width="1.5"/>
              <path d="M16 10c-3.314 0-6 2.239-6 5 0 1.657.996 3.125 2.5 4l-.5 3h8l-.5-3C21.004 18.125 22 16.657 22 15c0-2.761-2.686-5-6-5z" stroke="#6ee7a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="usp-text">Teknisk rådgivning, før under og efter projekt</p>
        </li>

      </ul>
    </div>

  </section>

  <script>
    const overlay = document.getElementById('spotlightOverlay');
    const cursorDot = document.getElementById('cursor');

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = mouseX;
    let currentY = mouseY;
    let rafId = null;
    let hasMovedOnce = false;

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function updateSpotlight() {
      // Smooth follow with slight lag for organic feel
      currentX = lerp(currentX, mouseX, 0.12);
      currentY = lerp(currentY, mouseY, 0.12);

      const px = currentX.toFixed(1);
      const py = currentY.toFixed(1);

      overlay.style.background = `radial-gradient(
        circle 340px at ${px}px ${py}px,
        transparent 0%,
        rgba(0,0,0,0.88) 52%,
        #000 78%
      )`;

      cursorDot.style.left = px + 'px';
      cursorDot.style.top  = py + 'px';

      rafId = requestAnimationFrame(updateSpotlight);
    }

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      if (!hasMovedOnce) {
        hasMovedOnce = true;
        currentX = mouseX;
        currentY = mouseY;
      }
    });

    // Start the animation loop
    rafId = requestAnimationFrame(updateSpotlight);

    // Pause loop when tab is hidden
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        cancelAnimationFrame(rafId);
      } else {
        rafId = requestAnimationFrame(updateSpotlight);
      }
    });
  </script>
</body>
</html>
