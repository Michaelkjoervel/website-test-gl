name: Deploy til GitHub Pages

on:
  push:
    branches:
      - main
      - claude/time-tracking-tool-aTwpD
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Tillad kun én samtidig deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Saml ét samlet site:
      #   - tidsregistreringen (anden branch) i roden -> /app.html bevares uændret
      #   - estimatet (denne branch) under /estimat/
      - name: Saml samlet site
        run: |
          rm -rf _site
          mkdir -p _site
          git fetch origin claude/time-tracking-tool-aTwpD
          git archive FETCH_HEAD | tar -x -C _site
          mkdir -p _site/estimat
          cp -r dist/. _site/estimat/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
